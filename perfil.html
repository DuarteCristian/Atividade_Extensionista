<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="stylePerfil.css">
</head>

<body>
    <button class="button" onclick="window.location.href='index.html'">EncontrePet</button>
    <h1 class="titulo">Minha conta</h1>
    <div class="perfil-card">
        <div class="perfil-header">
            <div class="avatar">👤</div>

        </div>

        <div class="perfil-body">
            <label class="titulo">Informações Pessoais </label>
            <br><br>
            <label>Nome completo</label>
            <input type="text" id="nome">

            <label>Email</label>
            <input type="email" id="email" disabled>

            <button class="btn-salvar">Salvar</button>
        </div>
    </div>
    <button class="Sair"><a href="login.html">Sair da Conta</a></button>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const nome = localStorage.getItem("nomeUsuario");
            const email = localStorage.getItem("emailUsuario");

            console.log("Carregando:", nome, email);

            document.getElementById("nome").value = nome || "";
            document.getElementById("email").value = email || "";
        });
    </script>
</body>

</html>
