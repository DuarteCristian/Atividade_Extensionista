<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="styleIndex.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <button class="button" onclick="window.location.href='index.html'">EncontrePet</button>
    <!-- Botão -->
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <!-- Overlay (fundo escuro) -->
    <div id="overlay" onclick="fecharMenu()"></div>
    <!-- Menu -->
    <div id="sidebar" class="sidebar">
        <a href="perfil.html">Perfil</a>
        <a href="contato.html">Contato</a>
        <a href="sobre.html">Sobre Nós</a>
        <a href="login.html">Sair</a>
    </div>
    <p class="welcome">Bora encontrar seu Pet!</p>
    <p class="P">Utilize ferramentas de busca de pets com eficácia.<br>
        Crie seu anúncio gratuito agora mesmo para ter acesso ao
        Painel de Busca.</p>

    <button class="cadastro" onclick="window.location.href='descricaoPet.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
        Buscar Pet
    </button>
    <button class="cadastro" onclick="window.location.href='cadastroPet.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
        Achei um Pet
    </button>
    <br><br>
    <p class="welcome">Pets Perdidos</p>
    <div id="lista-cards"></div>
    <div class="carrossel">

        <button class="seta esquerda" onclick="rolarCards(-300)">❮</button>

        <div id="lista-cards">
            <!-- seus cards aqui -->
        </div>

        <button class="seta direita" onclick="rolarCards(300)">❯</button>

    </div>

    <script>
        function rolarCards(valor) {
            const container = document.getElementById("lista-cards");
            container.scrollBy({
                left: valor,
                behavior: "smooth"
            });
        }

        let lista = JSON.parse(localStorage.getItem("pets")) || [];
        let container = document.getElementById("lista-cards");

        lista.forEach(pet => {
            let card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
        <img src="${pet.foto}" width="150">
        <p class="perdido">Situação: ${pet.situacao}</p>
        <p>Nome:  ${pet.nome}</p>
        <p>Descrição: ${pet.descricao}</p>
        <p>Ultimo lugar visto: ${pet.localizacao}</p>
        <p>Gênero: ${pet.genero}</p>
         <button class="btn-excluir">Excluir</button>
    `;
            card.querySelector(".btn-excluir").addEventListener("click", function () {

                // pega lista do localStorage
                let lista = JSON.parse(localStorage.getItem("pets")) || [];

                // remove o pet pelo ID
                lista = lista.filter(p => p.id !== pet.id);

                // salva novamente
                localStorage.setItem("pets", JSON.stringify(lista));

                // remove da tela
                card.remove();
            });
            container.appendChild(card);
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
