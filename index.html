<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="styleIndex.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <button class="button" onclick="window.location.href='index.html'">EncontrePet</button>
    <!-- Botão -->
    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <!-- Overlay (fundo escuro) -->
    <div id="overlay" onclick="fecharMenu()"></div>
    <!-- Menu -->
    <div id="sidebar" class="sidebar">
        <a href="perfil.html">Perfil</a>
        <a href="contato.html">Contato</a>
        <a href="sobre.html">Sobre Nós</a>
        <a href="login.html">Sair</a>
    </div>
    <p class="welcome">Bora encontrar seu Pet!</p>
    <p class="P">Utilize ferramentas de busca de pets com eficácia.<br>
        Crie seu anúncio gratuito agora mesmo para ter acesso ao
        Painel de Busca.</p>

    <button class="cadastro" onclick="window.location.href='cadastroPet.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
        Buscar Pet
    </button>
    <button class="cadastro" onclick="window.location.href='cadastroPet.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
        Achei um Pet
    </button>
    <br><br>
    <p class="welcome">Pets Perdidos</p>
    <div id="listaPets"></div>
    <script>
        let lista = JSON.parse(localStorage.getItem("pets")) || [];
        let container = document.getElementById("listaPets");

        lista.forEach(pet => {
            let card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
        <img src="${pet.foto}" width="150">
        <h3>${pet.nome}</h3>
        <p>${pet.descricao}</p>
    `;

            container.appendChild(card);
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
