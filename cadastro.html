<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro</title>
    <link rel="stylesheet" href="styleCadastro.css">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <div class="tela active" id="cadastro">
                <h2>Cadastro</h2>

                <form action="login.html">
                    <input type="nome" id="nome" placeholder="Nome completo" required>
                    <input type="email" id="email" placeholder="E-mail" required>
                    <input type="usuario" id="usuario" placeholder="Usuário" required>
                    <input type="password" id="senha" placeholder=" Senha" required>
                    <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required>
                    <button type="submit" onclick="cadastrar()">Cadastrar</button>
                </form>

            </div>
        </div>
    </div>


</body>

</html>
